<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>FAMAZ PERU - Panel de Rastreo</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 600px; width: 100%; border-radius: 10px; }
        body { font-family: Arial; margin: 20px; background: #f4f4f4; }
        .stats { display: flex; gap: 20px; margin-bottom: 20px; }
        .card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); flex: 1; }
    </style>
</head>
<body>
    <h1>Panel Administrativo - Famaz Rastreo</h1>
    
    <div class="stats">
        <div class="card">
            <h3>Usuarios Activos</h3>
            <p id="user-count">Cargando...</p>
        </div>
        <div class="card">
            <h3>Última Actualización</h3>
            <p id="last-update">-</p>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Configuración del Mapa centrado en Lima (Villa María del Triunfo)
        const map = L.map('map').setView([-12.1611, -76.9295], 13);
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        async function actualizarMapa() {
            try {
                // Cambia esta URL por la de tu API en Vercel
                const res = await fetch('/api/get-locations');
                const locations = await res.json();

                document.getElementById('user-count').innerText = locations.length;
                document.getElementById('last-update').innerText = new Date().toLocaleTimeString();

                locations.forEach(loc => {
                    L.marker([loc.lat, loc.lng])
                        .addTo(map)
                        .bindPopup(`<b>${loc.username}</b><br>Visto: ${new Date(loc.timestamp).toLocaleString()}`);
                });
            } catch (err) {
                console.error("Error cargando ubicaciones", err);
            }
        }

        // Actualizar cada 10 segundos
        setInterval(actualizarMapa, 10000);
        actualizarMapa();
    </script>
</body>
</html>
