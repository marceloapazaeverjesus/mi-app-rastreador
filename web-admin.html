<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Famaz Panel - Monitoreo</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; height: 100vh; }
        
        /* Lista Lateral */
        #sidebar { 
            width: 300px; 
            background: #fff; 
            border-right: 1px solid #ddd; 
            overflow-y: auto; 
            z-index: 1000;
            display: flex;
            flex-direction: column;
        }
        
        #sidebar h2 { padding: 15px; margin: 0; background: #007AFF; color: white; font-size: 18px; }
        
        .user-item { 
            padding: 15px; 
            border-bottom: 1px solid #eee; 
            cursor: pointer; 
            transition: background 0.3s;
        }
        
        .user-item:hover { background: #f0f7ff; }
        .user-name { font-weight: bold; color: #333; display: block; }
        .user-time { font-size: 11px; color: #888; }
        
        /* Mapa */
        #map { flex-grow: 1; height: 100%; }

        @media (max-width: 600px) {
            body { flex-direction: column; }
            #sidebar { width: 100%; height: 200px; }
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>Usuarios Activos</h2>
        <div id="user-list">
            <p style="padding: 15px; color: #888;">Cargando usuarios...</p>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Configuración inicial del Mapa
        const map = L.map('map').setView([-12.162, -76.936], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        let markers = {}; // Objeto para guardar los marcadores por ID de usuario

        async function updateDashboard() {
            try {
                // LLAMADA A TU API EN VERCEL
                const response = await fetch('https://mi-app-rastreador.vercel.app/api/users-status');
                const users = await response.json();

                const listContainer = document.getElementById('user-list');
                listContainer.innerHTML = ''; // Limpiar lista para actualizar

                users.forEach(user => {
                    const { id, username, latitude, longitude, last_update } = user;

                    // 1. ACTUALIZAR O CREAR MARCADOR EN EL MAPA
                    if (latitude && longitude) {
                        const pos = [latitude, longitude];
                        
                        if (markers[id]) {
                            markers[id].setLatLng(pos);
                        } else {
                            markers[id] = L.marker(pos).addTo(map)
                                .bindPopup(`<b>${username}</b><br>Última vez: ${new Date(last_update).toLocaleTimeString()}`);
                        }

                        // 2. AGREGAR A LA LISTA LATERAL
                        const userDiv = document.createElement('div');
                        userDiv.className = 'user-item';
                        userDiv.innerHTML = `
                            <span class="user-name">📍 ${username}</span>
                            <span class="user-time">Visto: ${new Date(last_update).toLocaleTimeString()}</span>
                        `;
                        
                        // 3. ACCIÓN AL DAR CLIC: Redirigir el mapa
                        userDiv.onclick = () => {
                            map.flyTo(pos, 17); // Zoom suave al usuario
                            markers[id].openPopup();
                        };
                        
                        listContainer.appendChild(userDiv);
                    }
                });

                if (users.length === 0) {
                    listContainer.innerHTML = '<p style="padding: 15px;">No hay usuarios reportando.</p>';
                }

            } catch (error) {
                console.error('Error al actualizar:', error);
            }
        }

        // Actualizar cada 5 segundos
        setInterval(updateDashboard, 5000);
        updateDashboard(); // Carga inicial
    </script>
</body>
</html>
