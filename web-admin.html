<!DOCTYPE html>
<html>
<head>
    <title>Panel Admin - Famaz Rastreo</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 100vh; width: 100%; }
        .user-label { background: white; border: 1px solid #333; padding: 2px 5px; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Configuración inicial del mapa en Lima (VMT)
        const map = L.map('map').setView([-12.162, -76.936], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let markers = {};

        async function updateMarkers() {
            try {
                // LLAMADA A TU API REAL EN VERCEL
                const response = await fetch('https://mi-app-rastreador.vercel.app/api/users-status');
                const users = await response.json();

                users.forEach(user => {
                    if (user.latitude && user.longitude) {
                        const isInactive = (new Date() - new Date(user.last_update)) > 300000; // 5 min
                        const color = isInactive ? 'gray' : 'red';
                        const statusText = isInactive ? '(Inactivo)' : '(En vivo)';

                        if (markers[user.id]) {
                            markers[user.id].setLatLng([user.latitude, user.longitude])
                                           .setPopupContent(`<b>${user.username}</b> ${statusText}`);
                        } else {
                            markers[user.id] = L.marker([user.latitude, user.longitude])
                                .addTo(map)
                                .bindPopup(`<b>${user.username}</b> ${statusText}`)
                                .openPopup();
                        }
                    }
                });
            } catch (e) {
                console.error("Error actualizando mapa:", e);
            }
        }

        // Actualizar cada 5 segundos en la web
        setInterval(updateMarkers, 5000);
        updateMarkers();
    </script>
</body>
</html>
